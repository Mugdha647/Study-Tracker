<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Study Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Daily Study Tracker</h1>

    <div class="date" id="date"></div>

    <div id="taskList"></div>

    <button class="reset-btn" onclick="resetData()">
      Reset All Data
    </button>

    <div class="note">
      ✔ Full Stack Practice = 3 Hours Daily <br>
      ✔ Problem Solving = 2 Hours Daily <br>
      ✔ IELTS Practice = 1 Hour Daily <br><br>

      If unfinished, remaining hours carry to next day.
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
